<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers Systems - Agendamento</title>
    <link rel="stylesheet" href="css/menu_cliente.css">

    <style>
        .footer-sair {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #e0e0e0;
        }

        .logout-btn-footer {
            background: #dc3545;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .logout-btn-footer:hover {
            background: #c82333;
        }

        .logout-btn-header {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-left: auto;
        }

        .logout-btn-header:hover {
            background: #c82333;
        }

        .copyright {
            margin-top: 15px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>

<div class="container">

<header class="header">

    <div class="cliente-card">
        <div class="cliente-avatar">
            <img src="css/imagens/barbeiro.png" alt="Cliente">
        </div>

        <div class="cliente-info">
            <span class="label">Cliente</span>
            <span class="nome">Carregando...</span>
        </div>
    </div>

    <div class="pontuacao-card">
        <div class="pontuacao-icone">
            <img src="css/imagens/pontuacao-maxima.png" alt="Pontuação">
        </div>

        <div class="pontuacao-info">
            <span class="label">Pontuação</span>
            <span class="valor">45</span>
        </div>
    </div>

</header>

<div class="ranking-card">

    <div class="ranking-left">
        <img src="css/imagens/ranking.png"
        alt="Ranking"
        class="ranking-icon">

        <span class="ranking-titulo">
            Ranking
        </span>
    </div>

    <span class="ranking-link">
        Tabela de pontuação
    </span>

</div>

<div class="busca-card">

    <img src="css/imagens/busca.png"
    alt="Buscar"
    class="busca-icon">

    <span class="busca-texto">
        Buscar estabelecimento
    </span>

</div>


<!-- ABERTOS -->

<section class="estabelecimentos-section">

    <div class="section-badge abertos">
        <span>Abertos agora</span>
    </div>

    <div
    class="estabelecimentos-grid"
    id="abertos">

    Carregando...

    </div>

</section>


<!-- FECHADOS -->

<section class="estabelecimentos-section">

    <div class="section-badge fechados">
        <span>Fechados que abrem em seguida</span>
    </div>

    <div
    class="estabelecimentos-grid"
    id="fechados">

    Carregando...

    </div>

</section>


<div class="footer-sair">
    <button
    class="logout-btn-footer"
    id="btnSairFooter">

    🚪 Sair da Conta

    </button>

    <div class="copyright">
        © 2026 Brothers Systems
    </div>
</div>

</div>

<script type="module">

import {
    buscarAbertos,
    buscarFechados
} from "./js/estabelecimentos.js";


// sessão
function pegarSessao() {
    return JSON.parse(
        localStorage.getItem(
            "usuarioLogado"
        )
    );
}

function logout() {

    localStorage.removeItem(
        "usuarioLogado"
    );

}


// verificar login
const user = pegarSessao();

if (!user) {

    alert(
        "Você não está logado!"
    );

    window.location.href =
    "index.html";

}


// nome usuário
const nomeClienteSpan =
document.querySelector(
'.cliente-info .nome'
);

if(user){

const nome =
user.user_metadata?.name ||
user.email?.split('@')[0] ||
"Cliente";

nomeClienteSpan.textContent =
nome;

}


// botão sair
document
.getElementById(
'btnSairFooter'
)
.addEventListener(
'click',
()=>{

if(confirm(
"Tem certeza que deseja sair?"
)){

logout();

window.location.href =
"index.html";

}

}
);


// carregar estabelecimentos
async function carregarEstabelecimentos(){

const [
abertos,
fechados
]
=
await Promise.all([

buscarAbertos(),
buscarFechados()

]);


renderizar(
abertos,
"abertos"
);

renderizar(
fechados,
"fechados"
);

}



function renderizar(
lista,
containerId
){

const container =
document.getElementById(
containerId
);

container.innerHTML="";


if(
!lista ||
lista.length===0
){

container.innerHTML=
`
<p>
Nenhum estabelecimento encontrado
</p>
`;

return;

}


lista.forEach(est=>{

container.innerHTML +=
`

<div class="estabelecimento-item">

    <div class="estabelecimento-logo">

        <img
        src="${est.imagem_url}"
        alt="${est.nome}"
        >

    </div>

    <span class="estabelecimento-nome">

        ${est.nome}

    </span>

</div>

`;

});

}


carregarEstabelecimentos();

</script>

</body>
</html>
