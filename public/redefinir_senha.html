            <form method="post">

                    <input type="password" placeholder="Confirme sua senha">
                    <i class="fa-solid fa-key"></i>

                <div class="botao_enviar">
                    <button type="submit">
                        Redefinir senha

                </div>

        </div>
        </div>

    </div>
